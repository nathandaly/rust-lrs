services:
  postgres:
    image: postgres:17
    container_name: rust_lrs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lrs
      POSTGRES_USER: lrs_owner
      POSTGRES_PASSWORD: lrs_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lrs_owner -d lrs"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: